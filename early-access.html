<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early Access | Mikosho</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="early-access.css">
</head>

<body>
    <a href="index.html#hero" class="close-btn" aria-label="Back to hero section">
        <span class="close-icon" aria-hidden="true"></span>
    </a>
    <main class="page-wrap">
        <form class="early-access-form" action="#" method="post">
            <div class="row two-col">
                <div class="field">
                    <label for="first-name">First name</label>
                    <input id="first-name" name="first_name" type="text" placeholder="Jane" />
                </div>
                <div class="field">
                    <label for="last-name">Last name</label>
                    <input id="last-name" name="last_name" type="text" placeholder="Doe" />
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="contact">Contact</label>
                    <input id="contact" name="contact" type="text"
                        placeholder="Emial, WhatsApp, or any other method" />
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="message">Your message</label>
                    <textarea id="message" name="message" rows="8" placeholder="Leave us a message"></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </main>
</body>

</html>
