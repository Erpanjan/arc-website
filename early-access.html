<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early Access | ARC</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="assets/css/early-access.css">
    <script src="assets/js/supabase-config.js" defer></script>
    <script src="assets/js/early-access.js" defer></script>
</head>

<body>
    <a href="index.html#hero" class="close-btn" aria-label="Back to hero section">
        <span class="close-icon" aria-hidden="true"></span>
    </a>
    <main class="page-wrap">
        <form class="early-access-form" id="early-access-form" action="#" method="post">
            <div class="row two-col">
                <div class="field">
                    <label for="first-name">First name</label>
                    <input id="first-name" name="first_name" type="text" placeholder="Jane" />
                </div>
                <div class="field">
                    <label for="last-name">Last name</label>
                    <input id="last-name" name="last_name" type="text" placeholder="Doe" />
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="contact">Contact</label>
                    <input id="contact" name="contact" type="text" placeholder="Emial, WhatsApp, or any other method" />
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label for="message">Your message</label>
                    <textarea id="message" name="message" rows="8" placeholder="Leave us a message"></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
            <div class="form-footer" style="margin-top: 24px; text-align: center; font-family: var(--font-mono, monospace); font-size: 10px; opacity: 0.5;">
                By submitting, you agree to our <a href="terms.html" style="color: inherit;">Terms</a> and <a href="privacy.html" style="color: inherit;">Privacy Policy</a>.
            </div>
            <p class="submit-success" id="submit-success" role="status" aria-live="polite">Submit Success</p>
            <p class="submit-error" id="submit-error" role="alert" aria-live="assertive"></p>
        </form>
    </main>
</body>

</html>
